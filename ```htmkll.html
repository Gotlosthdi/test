    </script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Read and clean the text
            let rawText = document.getElementById('raw-questions').textContent;
            
            // Clean up LaTeX style math formulas for better HTML rendering
            rawText = rawText
                .replace(/\$/g, '')
                .replace(/\\times/g, '×')
                .replace(/\{\\wedge\}/g, '^') 
                .replace(/\^{\\wedge}/g, '^')
                .replace(/~m\/s/g, ' m/s')
                .replace(/\\\*/g, '*');

            const questions = parseQuestions(rawText);
            document.getElementById('total').textContent = questions.length;
            
            const container = document.getElementById('quiz-container');
            container.innerHTML = ''; // Clear loading message
            
            let score = 0;

            // Render each question
            questions.forEach((q, qIndex) => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-sm border border-slate-200 p-5 md:p-8 mb-6 relative";

                const questionText = document.createElement('h2');
                questionText.className = "text-lg md:text-xl font-semibold text-slate-800 mb-6";
                questionText.innerHTML = `<span class="text-blue-600 font-bold mr-2">${q.number}.</span> ${q.text}`;
                card.appendChild(questionText);

                const optionsContainer = document.createElement('div');
                optionsContainer.className = "flex flex-col gap-3";
                
                let answered = false;

                q.options.forEach((opt) => {
                    const btn = document.createElement('button');
                    btn.className = "option-btn w-full text-left p-4 rounded-xl border border-slate-200 hover:bg-slate-50 text-slate-700 font-medium group flex justify-between items-center";
                    
                    btn.innerHTML = `
                        <span class="flex-1">
                            <span class="font-bold mr-3 text-slate-400 group-hover:text-blue-500 transition-colors">${opt.originalLetter}.</span> 
                            ${opt.text}
                        </span>
                        <span class="status-icon text-xl font-bold ml-4"></span>
                    `;

                    btn.addEventListener('click', () => {
                        if (answered) return;
                        answered = true;

                        // Disable all buttons in this question
                        const allBtns = optionsContainer.querySelectorAll('button');
                        allBtns.forEach(b => {
                            b.disabled = true;
                            b.classList.remove('hover:bg-slate-50', 'cursor-pointer');
                        });

                        const iconSpan = btn.querySelector('.status-icon');

                        if (opt.isCorrect) {
                            // Selected Correct Option
                            btn.classList.add('bg-green-50', 'border-green-500', 'text-green-800');
                            btn.classList.remove('border-slate-200', 'text-slate-700');
                            iconSpan.textContent = '✓';
                            iconSpan.classList.add('text-green-600');
                            
                            score++;
                            document.getElementById('score').textContent = score;
                        } else {
                            // Selected Incorrect Option
                            btn.classList.add('bg-red-50', 'border-red-500', 'text-red-800');
                            btn.classList.remove('border-slate-200', 'text-slate-700');
                            iconSpan.textContent = '✗';
                            iconSpan.classList.add('text-red-600');

                            // Reveal the correct option
                            const correctIndex = q.options.findIndex(o => o.isCorrect);
                            if (correctIndex !== -1) {
                                const correctBtn = allBtns[correctIndex];
                                correctBtn.classList.add('bg-green-50', 'border-green-500', 'text-green-800');
                                correctBtn.classList.remove('border-slate-200', 'text-slate-700');
                                const correctIcon = correctBtn.querySelector('.status-icon');
                                correctIcon.textContent = '✓';
                                correctIcon.classList.add('text-green-600');
                            }
                        }
                    });

                    optionsContainer.appendChild(btn);
                });

                card.appendChild(optionsContainer);
                container.appendChild(card);
            });
        });

        // Parser Function to extract questions from the raw text
        function parseQuestions(text) {
            const lines = text.split('\n').map(l => l.trim());
            const questions = [];
            let currentQ = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (!line) continue; 

                // Skip page markers and standalone numbers (page numbers)
                if (line.match(/^--- PAGE \d+ ---$/)) continue;
                if (line.match(/^\d+$/)) continue;

                // Match New Question (e.g., "1. What is...")
                const qMatch = line.match(/^(\d+)\.\s+(.*)/);
                if (qMatch) {
                    if (currentQ) questions.push(currentQ);
                    currentQ = {
                        number: parseInt(qMatch[1]),
                        text: qMatch[2],
                        options: []
                    };
                    continue;
                }

                if (currentQ) {
                    // Match Option (e.g., "A. Text", "✓ B. Text", "✔C. Text", "Α. 25%")
                    // Regex handles optional checkmarks (✓ or ✔), spaces, and Letters (A-Z or Greek)
                    const optMatch = line.match(/^(✓|✔)?\s*([A-ZΑ-Ωa-z])\.\s+(.*)/);

                    if (optMatch) {
                        const isCorrect = (optMatch[1] === '✓' || optMatch[1] === '✔');
                        const letter = optMatch[2];
                        const text = optMatch[3];
                        currentQ.options.push({ text: text, isCorrect: isCorrect, originalLetter: letter });
                    } else if (currentQ.options.length === 0) {
                        // Multi-line question text
                        currentQ.text += " " + line;
                    } else {
                        // Multi-line option text
                        currentQ.options[currentQ.options.length - 1].text += " " + line;
                    }
                }
            }
            if (currentQ) questions.push(currentQ);
            return questions;
        }
    </script>
